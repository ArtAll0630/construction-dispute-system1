<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建筑工程合同纠纷处理智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5f8f 100%);
            color: white;
            padding: 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            position: sticky; top: 0; z-index: 100;
        }
        .header-inner {
            max-width: 900px; margin: 0 auto; padding: 18px 24px;
            display: flex; align-items: center; gap: 14px;
        }
        .header-icon {
            width: 46px; height: 46px; background: rgba(255,255,255,0.15);
            border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
        }
        .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
        .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .chat-container {
            flex: 1; max-width: 900px; width: 100%; margin: 0 auto; padding: 20px;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .welcome-section { text-align: center; padding: 50px 20px 30px; }
        .welcome-section h2 { font-size: 26px; color: #1a3a5c; margin-bottom: 12px; }
        .welcome-section p { color: #666; font-size: 15px; line-height: 1.6; max-width: 500px; margin: 0 auto 30px; }
        .quick-questions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 600px; margin: 0 auto; }
        .quick-btn {
            background: white; border: 1px solid #d0d7de; border-radius: 20px;
            padding: 10px 18px; font-size: 13px; color: #333; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .quick-btn:hover {
            background: #1a3a5c; color: white; border-color: #1a3a5c;
            transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,58,92,0.3);
        }
        .messages { display: flex; flex-direction: column; gap: 20px; padding-bottom: 20px; }
        .message { display: flex; gap: 12px; max-width: 100%; animation: fadeIn 0.3s ease; }
        .message.user { flex-direction: row-reverse; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
        }
        .message.assistant .message-avatar { background: linear-gradient(135deg, #1a3a5c, #2a5f8f); color: white; }
        .message.user .message-avatar { background: linear-gradient(135deg, #e8a838, #d4943a); color: white; }
        .message-content {
            max-width: 75%; padding: 16px 20px; border-radius: 16px;
            line-height: 1.7; font-size: 14.5px; position: relative;
        }
        .message.assistant .message-content {
            background: white; color: #333; border: 1px solid #e1e5e9;
            border-top-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #1a3a5c, #2a5f8f);
            color: white; border-top-right-radius: 4px;
        }
        .typing-indicator { display: flex; gap: 5px; padding: 8px 0; }
        .typing-indicator span {
            width: 8px; height: 8px; background: #aaa; border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-8px); opacity: 1; } }
        .input-area {
            max-width: 900px; width: 100%; margin: 0 auto; padding: 0 20px 24px;
            position: sticky; bottom: 0; background: linear-gradient(to top, #f0f2f5 60%, transparent); padding-top: 20px;
        }
        .input-wrapper {
            display: flex; gap: 12px; align-items: flex-end;
            background: white; border-radius: 16px; padding: 8px 8px 8px 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08); border: 2px solid transparent; transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: #2a5f8f; }
        .input-wrapper textarea {
            flex: 1; border: none; outline: none; font-size: 15px; line-height: 1.5;
            resize: none; max-height: 120px; min-height: 24px; padding: 8px 0;
            font-family: inherit; color: #333; background: transparent;
        }
        .input-wrapper textarea::placeholder { color: #aaa; }
        .send-btn {
            width: 44px; height: 44px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #1a3a5c, #2a5f8f); color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(26,58,92,0.4); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .send-btn svg { width: 20px; height: 20px; }
        .input-hint { text-align: center; font-size: 12px; color: #999; margin-top: 10px; }
        .disclaimer { text-align: center; font-size: 11px; color: #999; padding: 10px 20px 20px; max-width: 900px; margin: 0 auto; }
        @media (max-width: 640px) {
            .header h1 { font-size: 17px; } .welcome-section h2 { font-size: 20px; }
            .message-content { max-width: 85%; } .quick-btn { font-size: 12px; padding: 8px 14px; }
        }
        .message-content h1, .message-content h2, .message-content h3 { margin: 12px 0 6px; color: #1a3a5c; }
        .message-content ul, .message-content ol { padding-left: 20px; margin: 8px 0; }
        .message-content li { margin-bottom: 4px; }
        .message-content code { background: #f4f5f7; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .message-content blockquote { border-left: 3px solid #2a5f8f; padding-left: 12px; margin: 8px 0; color: #555; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="header-icon">⚖️</div>
            <div>
                <h1>建筑工程合同纠纷处理智能体</h1>
                <p>基于阿里云百炼专业知识库 · 合同纠纷咨询与分析</p>
            </div>
        </div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="welcome-section" id="welcomeSection">
            <h2>🏗️ 欢迎使用建筑工程合同纠纷智能顾问</h2>
            <p>请输入您的合同纠纷问题，我将基于建筑工程法律知识库为您提供专业分析与建议</p>
            <div class="quick-questions">
                <button class="quick-btn" onclick="askQuick(this)">工程欠款如何追讨？</button>
                <button class="quick-btn" onclick="askQuick(this)">工程质量不合格怎么办？</button>
                <button class="quick-btn" onclick="askQuick(this)">工期延误的责任认定</button>
                <button class="quick-btn" onclick="askQuick(this)">合同无效的情形有哪些？</button>
                <button class="quick-btn" onclick="askQuick(this)">工程变更如何索赔？</button>
                <button class="quick-btn" onclick="askQuick(this)">竣工验收纠纷处理</button>
            </div>
        </div>
        <div class="messages" id="messages"></div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="请输入您的建筑工程合同纠纷问题..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                </svg>
            </button>
        </div>
        <div class="input-hint">按 Enter 发送，Shift + Enter 换行</div>
    </div>

    <div class="disclaimer">
        ⚠️ 本智能体提供的建议仅供参考，不构成正式法律意见。重要案件请咨询专业律师。
    </div>

    <script>
        const APP_ID = '6df99889dc0347ebb1687e5ad0cc91d0';   
        const API_KEY = 'sk-533c02670fc24d7fb18611fe554ba283';

        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeSection = document.getElementById('welcomeSection');
        const chatContainer = document.getElementById('chatContainer');

        let isLoading = false;

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        function askQuick(btn) {
            userInput.value = btn.textContent;
            sendMessage();
        }

        function renderMarkdown(text) {
            let html = text;
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/`(.+?)`/g, '<code>$1</code>');
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            html = html.replace(/\n/g, '<br>');
            html = html.replace(/<br><br>/g, '</p><p>');
            html = html.replace(/<br>(<h[123]>)/g, '$1');
            html = html.replace(/(<\/h[123]>)<br>/g, '$1');
            html = html.replace(/<br>(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)<br>/g, '$1');
            html = html.replace(/<br>(<blockquote>)/g, '$1');
            html = html.replace(/(<\/blockquote>)<br>/g, '$1');
            return html;
        }

        function addMessage(role, content) {
            welcomeSection.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '⚖️';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = role === 'assistant' ? renderMarkdown(content) : `<p>${escapeHtml(content)}</p>`;
            msgDiv.appendChild(avatar); msgDiv.appendChild(contentDiv);
            messagesDiv.appendChild(msgDiv); scrollToBottom();
        }

        function addTypingIndicator() {
            welcomeSection.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant'; msgDiv.id = 'typingMsg';
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar'; avatar.textContent = '⚖️';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            msgDiv.appendChild(avatar); msgDiv.appendChild(contentDiv);
            messagesDiv.appendChild(msgDiv); scrollToBottom();
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingMsg');
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isLoading) return;
            isLoading = true; sendBtn.disabled = true;

            addMessage('user', text);
            userInput.value = ''; userInput.style.height = 'auto';
            addTypingIndicator();

            try {
                const result = await callBailianAPI(text);
                removeTypingIndicator();
                addMessage('assistant', result);
            } catch (error) {
                removeTypingIndicator();
                console.error('API Error:', error);
                addMessage('assistant', `⚠️ 请求出错：${error.message}\n\n请检查：\n1. APP_ID 和 API_KEY 是否正确\n2. 百炼智能体已发布并处于“运行中”状态\n3. 网络是否正常`);
            } finally {
                isLoading = false; sendBtn.disabled = false; userInput.focus();
            }
        }

        async function callBailianAPI(question) {
            const url = `https://dashscope.aliyuncs.com/api/v1/apps/${APP_ID}/completion`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    input: { prompt: question },
                    parameters: { incremental_output: false }
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(`${response.status}: ${err.message || '请求被拒绝'}`);
            }

            const data = await response.json();
            if (data.output && data.output.text) {
                return data.output.text;
            } else {
                throw new Error('智能体未返回有效内容');
            }
        }

        userInput.focus();
    </script>
</body>
</html>
